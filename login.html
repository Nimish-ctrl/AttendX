<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AttendX — Organizer</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Playfair+Display:wght@400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing:border-box; margin:0; padding:0; }
  :root { --bg:#f8f7f4; --surface:#fff; --surface2:#f3f2ee; --text:#1a1a1a; --muted:#8a8a8a; --border:#e8e6e1; --red:#d94f4f; }
  html,body { min-height:100vh; background:var(--bg); color:var(--text); font-family:'Inter',sans-serif; }
  body::before { content:''; position:fixed; inset:0; z-index:0; background-image:radial-gradient(circle at 1px 1px,rgba(0,0,0,0.04) 1px,transparent 0); background-size:28px 28px; pointer-events:none; }

  nav { position:fixed; top:0; left:0; right:0; z-index:100; display:flex; align-items:center; justify-content:space-between; padding:1.1rem 2.5rem; background:rgba(248,247,244,0.9); backdrop-filter:blur(16px); border-bottom:1px solid var(--border); }
  .logo { font-family:'Playfair Display',serif; font-size:1.15rem; font-weight:400; }
  .logo em { font-style:italic; color:var(--muted); }
  .nav-back { font-size:0.8rem; color:var(--muted); text-decoration:none; transition:color 0.2s; }
  .nav-back:hover { color:var(--text); }

  .wrap { position:relative; z-index:1; min-height:100vh; display:flex; align-items:center; justify-content:center; padding:2rem; }
  .box { background:var(--surface); border:1px solid var(--border); border-radius:20px; padding:2.5rem; width:380px; }
  .box h2 { font-family:'Playfair Display',serif; font-size:1.7rem; font-weight:400; margin-bottom:0.4rem; }
  .box p.sub { font-size:0.82rem; color:var(--muted); margin-bottom:2rem; line-height:1.6; }

  .tabs { display:flex; gap:0; margin-bottom:1.75rem; border-bottom:1px solid var(--border); }
  .tab { flex:1; padding:0.6rem; border:none; background:transparent; font-family:'Inter',sans-serif; font-size:0.82rem; font-weight:500; color:var(--muted); cursor:pointer; position:relative; transition:color 0.2s; }
  .tab.active { color:var(--text); }
  .tab.active::after { content:''; position:absolute; bottom:-1px; left:0; right:0; height:2px; background:var(--text); }

  .form-group { margin-bottom:1rem; }
  label { display:block; font-size:0.72rem; font-weight:500; color:var(--muted); letter-spacing:0.08em; text-transform:uppercase; margin-bottom:0.4rem; }
  input { width:100%; padding:0.75rem 0.9rem; background:var(--surface2); border:1px solid var(--border); border-radius:10px; color:var(--text); font-family:'Inter',sans-serif; font-size:0.88rem; outline:none; transition:border-color 0.2s; }
  input:focus { border-color:var(--text); }

  .btn { width:100%; padding:0.8rem; border-radius:10px; border:none; background:var(--text); color:#fff; font-family:'Inter',sans-serif; font-size:0.88rem; font-weight:500; cursor:pointer; transition:background 0.2s; margin-top:0.5rem; display:flex; align-items:center; justify-content:center; gap:0.5rem; }
  .btn:hover { background:#333; }
  .btn:disabled { opacity:0.5; cursor:not-allowed; }

  #err { font-size:0.8rem; color:var(--red); margin-top:0.75rem; display:none; text-align:center; }
  .spin { width:14px;height:14px;border:2px solid rgba(255,255,255,0.3);border-top-color:#fff;border-radius:50%;animation:spin 0.7s linear infinite;display:none; }
  @keyframes spin { to{transform:rotate(360deg)} }

  .panel { display:none; } .panel.active { display:block; animation:fadeIn 0.25s ease; }
  @keyframes fadeIn { from{opacity:0;transform:translateY(6px)} to{opacity:1;transform:translateY(0)} }
</style>
</head>
<body>
<nav>
  <div class="logo">Attend<em>X</em></div>
  <a href="index.html" class="nav-back">← Home</a>
</nav>

<div class="wrap">
  <div class="box">
    <h2>Organizer access</h2>
    <p class="sub">Sign in to manage your spaces and members.</p>

    <div class="tabs">
      <button class="tab active" onclick="sw('login')">Sign in</button>
      <button class="tab" onclick="sw('register')">Create account</button>
    </div>

    <div class="panel active" id="panel-login">
      <div class="form-group"><label>Email</label><input type="email" id="li-email" /></div>
      <div class="form-group"><label>Password</label><input type="password" id="li-pass" /></div>
      <button class="btn" onclick="doLogin()" id="li-btn">Sign in <div class="spin" id="li-spin"></div></button>
    </div>

    <div class="panel" id="panel-register">
      <div class="form-group"><label>Full name</label><input type="text" id="re-name" /></div>
      <div class="form-group"><label>Email</label><input type="email" id="re-email" /></div>
      <div class="form-group"><label>Password</label><input type="password" id="re-pass" /></div>
      <button class="btn" onclick="doRegister()" id="re-btn">Create account <div class="spin" id="re-spin"></div></button>
    </div>

    <p id="err"></p>
  </div>
</div>

<script>
const API = window.location.origin;

function sw(t) {
  document.querySelectorAll('.tab').forEach((el,i)=>el.classList.toggle('active', ['login','register'][i]===t));
  document.querySelectorAll('.panel').forEach(p=>p.classList.remove('active'));
  document.getElementById('panel-'+t).classList.add('active');
  document.getElementById('err').style.display='none';
}

function showErr(msg) {
  const e = document.getElementById('err');
  e.textContent = msg; e.style.display = 'block';
}

async function doLogin() {
  const email = document.getElementById('li-email').value.trim();
  const pass  = document.getElementById('li-pass').value;
  if (!email || !pass) return showErr('Enter your email and password.');

  const btn = document.getElementById('li-btn');
  const spin = document.getElementById('li-spin');
  btn.disabled = true; spin.style.display = 'block';

  try {
    const r = await fetch(`${API}/teachers/login`, {
      method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({email, password: pass})
    });
    const d = await r.json();
    if (!r.ok) { showErr(d.detail || 'Login failed.'); }
    else {
      localStorage.setItem('attendx_token', d.token);
      localStorage.setItem('attendx_name', d.name);
      window.location.href = 'dashboard.html';
    }
  } catch(e) { showErr('Cannot reach server.'); }
  btn.disabled = false; spin.style.display = 'none';
}

async function doRegister() {
  const name  = document.getElementById('re-name').value.trim();
  const email = document.getElementById('re-email').value.trim();
  const pass  = document.getElementById('re-pass').value;
  if (!name || !email || !pass) return showErr('Fill in all fields.');
  if (pass.length < 6) return showErr('Password must be at least 6 characters.');

  const btn = document.getElementById('re-btn');
  const spin = document.getElementById('re-spin');
  btn.disabled = true; spin.style.display = 'block';

  try {
    const r = await fetch(`${API}/teachers/register`, {
      method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({name, email, password: pass})
    });
    const d = await r.json();
    if (!r.ok) { showErr(d.detail || 'Registration failed.'); }
    else {
      localStorage.setItem('attendx_token', d.token);
      localStorage.setItem('attendx_name', d.name);
      window.location.href = 'dashboard.html';
    }
  } catch(e) { showErr('Cannot reach server.'); }
  btn.disabled = false; spin.style.display = 'none';
}
</script>
</body>
</html>
